<!DOCTYPE html>
<html lang="en">

    })();

  <script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />

  <meta name="theme-color" content="#1A2826" media="(prefers-color-scheme: dark)" />

  <meta name="apple-mobile-web-app-capable" content="yes" />

  <title>Homefront &bull; Move-In Checklist</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg1: #EDE6E1; --bg2: #E7DFD9; --ink: #1F3D3A; --muted: #5A7D8C; --accent: #E3B86C;
      --card-bg: rgba(255,255,255,0.84); --card-border: rgba(255,255,255,0.72);
      --card-shadow: rgba(31,61,58,0.06);
      --nav-bg: rgba(255,255,255,0.82); --nav-border: rgba(255,255,255,0.76);
      --nav-active-bg: rgba(31,61,58,0.08);
      --check-bg: rgba(42,122,74,0.12); --check-color: #2A7A4A;
      --warn-bg: rgba(196,75,40,0.09); --warn-color: #8A3E28;
      --toast-bg: #1F3D3A;
    }
    [data-theme="dark"] {
      --bg1: #1A2826; --bg2: #141F1E; --ink: #E8F0EE; --muted: #A8C8D4;
      --card-bg: rgba(255,255,255,0.06); --card-border: rgba(255,255,255,0.08);
      --card-shadow: rgba(0,0,0,0.28);
      --nav-bg: rgba(20,31,30,0.95); --nav-border: rgba(255,255,255,0.08);
      --nav-active-bg: rgba(255,255,255,0.08);
      --check-bg: rgba(42,122,74,0.18); --check-color: #6FC98A;
      --warn-bg: rgba(196,75,40,0.16); --warn-color: #F09070;
      --toast-bg: #2A4A46;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, rgba(227,184,108,0.12), transparent 28%),
                  linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      color: var(--ink); min-height: 100dvh; -webkit-font-smoothing: antialiased;
      padding-bottom: 90px;
    }
    .shell { max-width: 480px; margin: 0 auto; padding: 0 16px 16px; }

    /* Top bar */
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 0 10px; }
    .back-btn { border: none; background: rgba(255,255,255,0.5); border-radius: 14px; padding: 10px 16px; font-family: inherit; font-size: 14px; font-weight: 700; color: var(--ink); cursor: pointer; box-shadow: 0 4px 10px rgba(31,61,58,0.08); }
    [data-theme="dark"] .back-btn { background: rgba(255,255,255,0.09) !important; }
    .reset-btn { border: none; background: none; color: var(--muted); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; padding: 8px 12px; border-radius: 10px; }

    /* Hero */
    .hero {
      background: linear-gradient(135deg, #1F3D3A 0%, #2A524F 100%);
      border-radius: 24px; padding: 22px 20px; margin-bottom: 14px;
      color: #E8F0EE;
    }
    .hero-eyebrow { font-size: 11px; font-weight: 800; letter-spacing: 0.10em; text-transform: uppercase; opacity: 0.65; margin-bottom: 8px; }
    .hero-title { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 6px; }
    .hero-sub { font-size: 13px; opacity: 0.75; line-height: 1.5; margin-bottom: 16px; }
    .progress-bar-wrap { background: rgba(255,255,255,0.15); border-radius: 99px; height: 8px; margin-bottom: 8px; }
    .progress-bar-fill { height: 100%; border-radius: 99px; background: #7FD4A0; transition: width 0.4s ease; }
    .progress-label { font-size: 12px; opacity: 0.80; display: flex; justify-content: space-between; }

    /* Section headers */
    .section-head { margin: 18px 0 10px; }
    .section-title { font-size: 17px; font-weight: 800; color: var(--ink); }
    .section-sub { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; }

    /* Checklist cards */
    .check-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 18px; padding: 14px 16px;
      box-shadow: 0 4px 14px var(--card-shadow);
      margin-bottom: 8px; cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      display: flex; gap: 14px; align-items: flex-start;
    }
    .check-card:active { transform: scale(0.98); }
    .check-card.done { background: var(--check-bg); border-color: rgba(42,122,74,0.20); }
    .check-card.flagged { background: var(--warn-bg); border-color: rgba(196,75,40,0.20); }

    .check-box {
      width: 24px; height: 24px; border-radius: 8px; border: 2px solid rgba(90,125,140,0.25);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all 0.2s ease; margin-top: 1px;
    }
    .check-card.done .check-box { background: #2A7A4A; border-color: #2A7A4A; color: white; }
    .check-card.flagged .check-box { background: #C44B28; border-color: #C44B28; color: white; }

    .check-body { flex: 1; min-width: 0; }
    .check-title { font-size: 14px; font-weight: 700; color: var(--ink); line-height: 1.3; }
    .check-card.done .check-title { color: var(--check-color); }
    .check-card.flagged .check-title { color: var(--warn-color); }
    .check-desc { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
    .check-why { font-size: 12px; color: var(--muted); background: rgba(90,125,140,0.07); border-radius: 8px; padding: 6px 10px; margin-top: 8px; line-height: 1.4; }
    .check-critical { display: inline-block; font-size: 10px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; background: rgba(196,75,40,0.12); color: #8A3E28; border-radius: 6px; padding: 2px 7px; margin-bottom: 5px; }
    [data-theme="dark"] .check-critical { background: rgba(196,75,40,0.22) !important; color: #F09070 !important; }

    .check-actions { display: flex; gap: 8px; margin-top: 10px; }
    .check-action-btn { border: none; border-radius: 10px; padding: 7px 12px; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.18s ease; }
    .btn-done    { background: rgba(42,122,74,0.14); color: #2A7A4A; }
    .btn-flagged { background: rgba(196,75,40,0.12); color: #8A3E28; }
    .btn-reset   { background: rgba(90,125,140,0.10); color: var(--muted); }
    [data-theme="dark"] .btn-done    { background: rgba(42,122,74,0.22) !important; color: #6FC98A !important; }
    [data-theme="dark"] .btn-flagged { background: rgba(196,75,40,0.22) !important; color: #F09070 !important; }

    /* Summary card */
    .summary-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 20px; padding: 16px 18px; box-shadow: 0 6px 18px var(--card-shadow);
      margin-bottom: 12px; display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; text-align: center;
    }
    .summary-val { font-size: 22px; font-weight: 900; color: var(--ink); }
    .summary-val.green { color: #2A7A4A; }
    .summary-val.red   { color: #C44B28; }
    .summary-label { font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }

    /* Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--nav-bg); border-top: 1px solid var(--nav-border);
      display: flex; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 100;
    }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px 8px; font-size: 10px; font-weight: 600; color: var(--muted); cursor: pointer; border-radius: 14px; transition: color 0.18s ease, background 0.18s ease; }
    .nav-item i { font-size: 22px; display: block; line-height: 1.1; color: inherit; }
    .nav-item.active { color: var(--ink); background: var(--nav-active-bg); }

    /* Toast */
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--toast-bg); color: #E8F0EE; font-size: 14px; font-weight: 700; padding: 10px 20px; border-radius: 99px; opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 999; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .check-note-wrap { margin-top:8px; }
    .check-note-btn {
      border:none; background:none; padding:0;
      font-family:inherit; font-size:12px; font-weight:600;
      color:var(--muted); cursor:pointer; text-decoration:underline;
    }
    .check-note-input {
      width:100%; margin-top:6px; border:1px solid rgba(90,125,140,0.22);
      border-radius:10px; padding:8px 10px; font-family:inherit;
      font-size:12px; background:rgba(90,125,140,0.06); color:var(--ink);
      outline:none; resize:none; line-height:1.5;
      transition:border-color 0.18s ease;
    }
    .check-note-input:focus { border-color:var(--muted); }
    [data-theme="dark"] .check-note-input {
      background:rgba(255,255,255,0.06)!important;
      border-color:rgba(255,255,255,0.14)!important;
      color:#E8F0EE!important;
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="top-bar">
    <button class="back-btn" onclick="history.back()">&larr; Back</button>
    <button class="reset-btn" onclick="resetChecklist()">Reset all</button>
  </div>

  <div class="hero">
    <div class="hero-eyebrow">Move-in inspection</div>
    <div class="hero-title">Know exactly what you're moving into.</div>
    <div class="hero-sub">A home inspector charges $400 for this. Work through it room by room and flag anything that needs attention.</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label"><span id="progressText">0 of 0 checked</span><span id="progressPct">0%</span></div>
  </div>

  <div class="summary-card" id="summaryCard">
    <div><div class="summary-val green" id="sumDone">0</div><div class="summary-label">Checked</div></div>
    <div><div class="summary-val red" id="sumFlagged">0</div><div class="summary-label">Flagged</div></div>
    <div><div class="summary-val" id="sumRemaining">0</div><div class="summary-label">Remaining</div></div>
  </div>

  <div id="checklistContent"></div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'homefrontMoveInChecklist';

const CHECKLIST = [
  {
    section: 'Safety — check these first',
    sectionSub: 'These affect your family\'s immediate safety. Do not skip.',
    items: [
      { id:'smoke1', critical:true, title:'Test every smoke detector', desc:'Press the test button on each one. Replace batteries even if they pass — move-in is the right time.', why:'Smoke detectors save lives. Sellers often remove batteries to stop false alarms during showings.' },
      { id:'co1', critical:true, title:'Test carbon monoxide detectors', desc:'CO is odorless and kills quickly. Test all detectors and note their age — replace if over 5 years old.', why:'CO leaks from furnaces, water heaters, and attached garages. Detectors degrade over time.' },
      { id:'gfci1', critical:true, title:'Test all GFCI outlets', desc:'Press the TEST button on outlets in bathrooms, kitchen, garage, and exterior. The outlet should go dead. Press RESET to restore.', why:'GFCI outlets prevent electrocution near water. Faulty ones are a serious hazard.' },
      { id:'panel1', critical:true, title:'Locate and inspect the electrical panel', desc:'Find the breaker box. Check that all breakers are labeled. Look for signs of burning, rust, or double-tapped breakers.', why:'Double-tapped breakers and unlabeled panels are fire hazards and common code violations.' },
      { id:'gas1', critical:true, title:'Know where the gas shutoff is', desc:'Locate the main gas shutoff valve. Make sure you can operate it. Note its location for emergencies.', why:'In a gas leak or earthquake, seconds matter.' },
      { id:'water1', critical:true, title:'Locate the main water shutoff', desc:'Find it (usually in basement, crawlspace, or utility room). Turn it to confirm it works. A stuck valve during a pipe burst means thousands in water damage.', why:'A burst pipe with a stuck shutoff valve is catastrophic.' },
    ]
  },
  {
    section: 'Water & plumbing',
    sectionSub: 'Water damage is the most common and expensive home problem.',
    items: [
      { id:'wh1', title:'Check water heater age and condition', desc:'Find the manufacture date on the label (usually a sticker on the side). Check for rust, corrosion, or moisture at the base.', why:'Water heaters over 10-12 years old are near end of life. A leaking tank causes major damage.' },
      { id:'wh2', title:'Run all hot water taps', desc:'Check that hot water arrives within a reasonable time at each tap. Slow hot water can indicate sediment buildup or a failing unit.', why:'Lets you assess the water heater\'s condition and the plumbing layout.' },
      { id:'drain1', title:'Check all drains for slow drainage', desc:'Run water in every sink, tub, and shower. Slow drains suggest clogs or vent pipe issues in the plumbing stack.', why:'Slow drains at move-in often mean a bigger blockage is coming.' },
      { id:'toilet1', title:'Check every toilet for leaks and wobble', desc:'Wiggle the base gently. Check for water around the base after flushing. A wobbly toilet means a failed wax ring.', why:'A leaking toilet base silently rots the subfloor underneath.' },
      { id:'cabinet1', title:'Check under every sink for moisture or stains', desc:'Look inside all sink cabinets for water stains, soft wood, mold, or active drips. Bring a flashlight.', why:'Slow leaks under sinks often go unnoticed for years and destroy cabinet floors.' },
      { id:'water2', title:'Check water pressure', desc:'Turn on multiple taps simultaneously and note whether pressure drops significantly. Check for discolored water on first run.', why:'Low pressure may indicate supply line issues or a partially closed main valve.' },
      { id:'outdoor1', title:'Check outdoor hose bibs', desc:'Turn on every exterior spigot and check for leaks at the connection point. Note if they have shutoff valves inside.', why:'Broken outdoor spigots freeze in winter and can crack interior pipes.' },
    ]
  },
  {
    section: 'HVAC & air quality',
    sectionSub: 'The most expensive system in the house. Know its condition before you move in.',
    items: [
      { id:'hvac1', title:'Find and check the air filter', desc:'Locate the air handler/furnace and pull the filter. A clogged filter at move-in means the system has been neglected. Replace immediately.', why:'A dirty filter at move-in tells you a lot about how the home was maintained.' },
      { id:'hvac2', title:'Run heating and cooling and check all vents', desc:'Set the thermostat to heat, wait 5 minutes, check every vent for airflow. Repeat for cooling. Note any rooms with weak airflow.', why:'Uneven airflow suggests duct problems or closed dampers — worth knowing before winter.' },
      { id:'hvac3', title:'Find the HVAC system age', desc:'Check the label on the outdoor condenser unit and air handler for manufacture date. Note the age.', why:'HVAC systems over 15 years old may need replacement within your ownership window.' },
      { id:'vent1', title:'Check bathroom exhaust fans', desc:'Turn on each bathroom fan. Hold a piece of tissue up — it should be pulled toward the grille. Check that the exterior vent flap opens.', why:'Non-functioning exhaust fans cause moisture buildup, mold, and paint damage.' },
      { id:'dryer1', title:'Inspect dryer vent from outside', desc:'Find the dryer exhaust vent on the exterior wall. Check that the flap opens and there is no lint blockage visible.', why:'Clogged dryer vents are the #1 cause of appliance fires. Know its condition before your first load.' },
    ]
  },
  {
    section: 'Exterior & structure',
    sectionSub: 'Problems here are expensive and often hidden until they\'re serious.',
    items: [
      { id:'roof1', title:'Visually inspect the roof from ground level', desc:'Look for missing or curling shingles, visible sagging, or damage around chimneys and vents. Binoculars help.', why:'A failing roof is one of the most expensive repairs a homeowner faces.' },
      { id:'gutter1', title:'Check gutters and downspouts', desc:'Look for gutters pulling away from the fascia, visible rust or holes, and downspouts that drain away from the foundation.', why:'Gutters that dump water at the foundation cause basement flooding and foundation issues.' },
      { id:'found1', title:'Walk the foundation perimeter', desc:'Look for cracks wider than 1/4 inch, especially diagonal cracks at corners. Note any water staining or efflorescence (white mineral deposits).', why:'Structural cracks and water infiltration at the foundation are serious and expensive.' },
      { id:'grade1', title:'Check yard grading around the house', desc:'The ground should slope away from the foundation by at least 6 inches over the first 10 feet.', why:'Poor grading directs rainwater toward the foundation and into basements.' },
      { id:'window1', title:'Check every window and exterior door', desc:'Open and close each window. Check for broken seals (foggy glass between panes), rotted frames, and gaps around door frames.', why:'Failed window seals reduce insulation value. Gaps around doors let in cold air, pests, and water.' },
      { id:'deck1', title:'Check any deck or porch', desc:'Walk the full deck and press down on boards near the ledger (where it attaches to the house). Look for soft or bouncy boards and check that the ledger is lag-bolted not nailed.', why:'Deck collapses cause serious injuries. Nailed ledgers are a common code violation.' },
    ]
  },
  {
    section: 'Interior',
    sectionSub: 'Things that are easy to miss during a showing.',
    items: [
      { id:'ceil1', title:'Check ceilings and walls for water stains', desc:'Look in every room for brown or yellow water stains, especially in corners, near windows, and on ceilings below bathrooms.', why:'Old stains may be fixed. Active or growing stains mean there is an ongoing leak.' },
      { id:'floor1', title:'Check floors for soft spots or squeaks', desc:'Walk every room and note any soft, spongy, or bouncy areas — especially in bathrooms and kitchens near appliances.', why:'Soft floors indicate subfloor rot from a moisture source that may still be active.' },
      { id:'attic1', title:'Check attic for insulation and moisture', desc:'If accessible, look for adequate insulation coverage, daylight through the roof deck (bad), and any dark staining or mold on the sheathing.', why:'Attic moisture and insufficient insulation are common and significantly impact energy costs.' },
      { id:'basement1', title:'Check basement or crawlspace for moisture', desc:'Look for white mineral deposits (efflorescence) on walls, water staining at the base, standing water, and musty smell.', why:'Basement moisture is one of the most common and expensive ongoing problems for homeowners.' },
      { id:'outlet1', title:'Test every outlet', desc:'Bring a phone charger or outlet tester. Plug into every outlet in every room and confirm it works.', why:'Dead outlets suggest wiring problems that are expensive to trace and repair.' },
      { id:'door1', title:'Test every interior door', desc:'Close and latch every door. Doors that stick or will not latch indicate settling, humidity swelling, or foundation movement.', why:'Sticking doors throughout the house can indicate foundation settlement.' },
      { id:'garage1', title:'Test garage door auto-reverse', desc:'Place a 2x4 flat on the ground in the path of the door. The door should automatically reverse when it hits the board.', why:'A garage door that does not reverse is a serious safety hazard, especially for children.' },
    ]
  },
  {
    section: 'Appliances & systems',
    sectionSub: 'Confirm everything that is supposed to convey actually works.',
    items: [
      { id:'app1', title:'Test every appliance that conveys', desc:'Run the dishwasher through a cycle. Run the washer and dryer. Test all burners and the oven. Run the refrigerator ice maker.', why:'Sellers are not required to disclose appliance problems. Test at move-in while you still have recourse.' },
      { id:'app2', title:'Check refrigerator and freezer temperatures', desc:'Fridge should be 35-38°F, freezer 0°F. Use a thermometer. Allow 24 hours for temps to stabilize after moving in.', why:'A refrigerator that cannot hold temperature is failing or has a refrigerant leak.' },
      { id:'irr1', title:'Test irrigation system if present', desc:'Run each zone and check for broken heads, poor coverage, or zones that will not activate.', why:'Irrigation repairs are expensive and easier to negotiate before closing than after.' },
      { id:'sep1', title:'Locate and note septic system if applicable', desc:'Find the cleanout access points. Ask for the last service record. Pumping costs $300-600 and should be done every 3-5 years.', why:'A neglected septic system can fail completely, costing $15,000+ to replace.' },
    ]
  },
];

const STORAGE_VER = 'v1';
let state = {};


function getNotes() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY + '_notes') || '{}'); } catch(e) { return {}; }
}
function saveNote(id, val) {
  const notes = getNotes();
  if (val.trim()) notes[id] = val;
  else delete notes[id];
  localStorage.setItem(STORAGE_KEY + '_notes', JSON.stringify(notes));
}
function toggleNote(id) {
  const wrap = document.getElementById('noteWrap_' + id);
  if (!wrap) return;
  const area = wrap.querySelector('textarea');
  if (wrap.dataset.open === '1') {
    wrap.dataset.open = '0';
    area.style.display = 'none';
    wrap.querySelector('.check-note-btn').textContent = getNotes()[id] ? '\uD83D\uDCDD Edit note' : '+ Add note';
  } else {
    wrap.dataset.open = '1';
    area.style.display = 'block';
    area.focus();
    wrap.querySelector('.check-note-btn').textContent = 'Done';
  }
}

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (saved.ver === STORAGE_VER) state = saved.items || {};
    else state = {};
  } catch(e) { state = {}; }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ ver: STORAGE_VER, items: state }));
}

function setItem(id, status) {
  // toggle if same status
  if (state[id] === status) state[id] = null;
  else state[id] = status;
  saveState();
  renderAll();
  updateProgress();
}

function resetChecklist() {
  if (!confirm('Reset the entire checklist? All progress will be cleared.')) return;
  state = {};
  saveState();
  renderAll();
  updateProgress();
  showToast('Checklist reset');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

function updateProgress() {
  let total = 0, done = 0, flagged = 0;
  CHECKLIST.forEach(function(section) {
    section.items.forEach(function(item) {
      total++;
      if (state[item.id] === 'done') done++;
      if (state[item.id] === 'flagged') flagged++;
    });
  });
  const checked = done + flagged;
  const pct = total > 0 ? Math.round((checked / total) * 100) : 0;
  const fill = document.getElementById('progressFill');
  const label = document.getElementById('progressText');
  const pctEl = document.getElementById('progressPct');
  const sumDone = document.getElementById('sumDone');
  const sumFlagged = document.getElementById('sumFlagged');
  const sumRemaining = document.getElementById('sumRemaining');
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = checked + ' of ' + total + ' checked';
  if (pctEl) pctEl.textContent = pct + '%';
  if (sumDone) sumDone.textContent = done;
  if (sumFlagged) sumFlagged.textContent = flagged;
  if (sumRemaining) sumRemaining.textContent = total - checked;
}

function renderAll() {
  const container = document.getElementById('checklistContent');
  let html = '';
  CHECKLIST.forEach(function(section) {
    html += '<div class="section-head"><div class="section-title">' + section.section + '</div>';
    if (section.sectionSub) html += '<div class="section-sub">' + section.sectionSub + '</div>';
    html += '</div>';
    section.items.forEach(function(item) {
      const status = state[item.id] || null;
      const isDone = status === 'done';
      const isFlagged = status === 'flagged';
      const cardCls = isDone ? 'check-card done' : isFlagged ? 'check-card flagged' : 'check-card';
      const checkContent = isDone ? '&#10003;' : isFlagged ? '!' : '';
      html += '<div class="' + cardCls + '">' +
        '<div class="check-box">' + checkContent + '</div>' +
        '<div class="check-body">' +
          (item.critical ? '<div class="check-critical">Safety critical</div>' : '') +
          '<div class="check-title">' + item.title + '</div>' +
          '<div class="check-desc">' + item.desc + '</div>' +
          (item.why ? '<div class="check-why">' + item.why + '</div>' : '') +
          '<div class="check-actions">' +
            '<button class="check-action-btn ' + (isDone?'btn-reset':'btn-done') + '" onclick="setItem(\'' + item.id + '\',\'done\')">' + (isDone ? 'Undo' : '&#10003; Looks good') + '</button>' +
            '<button class="check-action-btn ' + (isFlagged?'btn-reset':'btn-flagged') + '" onclick="setItem(\'' + item.id + '\',\'flagged\')">' + (isFlagged ? 'Unflag' : '&#9888; Flag issue') + '</button>' +
          '</div>' +
          (function() {
            const notes = getNotes();
            const hasNote = notes[item.id];
            return '<div class="check-note-wrap" id="noteWrap_' + item.id + '" data-open="0">' +
              '<button class="check-note-btn" onclick="toggleNote(\'' + item.id + '\')">' + (hasNote ? '\uD83D\uDCDD Edit note' : '+ Add note') + '</button>' +
              '<textarea class="check-note-input" rows="2" style="display:none;" ' +
                'oninput="saveNote(\'' + item.id + '\',this.value)" ' +
                'onblur="saveNote(\'' + item.id + '\',this.value)">' +
                (hasNote ? hasNote : '') +
              '</textarea>' +
            '</div>';
          })() +
        '</div>' +
      '</div>';
    });
  });
  container.innerHTML = html;
}

loadState();
renderAll();
updateProgress();
</script>
</body>
</html>
