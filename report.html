<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function() {
      if (sessionStorage.getItem('homefrontAccess') !== 'granted') {
        location.replace('index.html');
      }
    })();
  </script>
  <script>
    (function() {
      try {
        var s = JSON.parse(localStorage.getItem('homefrontSettings') || '{}');
        if (s.darkModeEnabled) document.documentElement.setAttribute('data-theme', 'dark');
      } catch(e) {}
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1F3D3A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Homefront &bull; Home Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg1: #EDE6E1; --bg2: #E7DFD9; --ink: #1F3D3A; --muted: #5A7D8C;
      --card-bg: rgba(255,255,255,0.90); --card-border: rgba(255,255,255,0.72);
      --card-shadow: rgba(31,61,58,0.07);
      --green: #2A7A4A; --amber: #7A5A18; --red: #8A3E28;
    }
    [data-theme="dark"] {
      --bg1: #1A2826; --bg2: #141F1E; --ink: #E8F0EE; --muted: #A8C8D4;
      --card-bg: rgba(255,255,255,0.07); --card-border: rgba(255,255,255,0.10);
      --card-shadow: rgba(0,0,0,0.30);
      --green: #6FC98A; --amber: #E3B86C; --red: #F09070;
    }
    body {
      font-family: 'Inter', sans-serif; background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      color: var(--ink); min-height: 100dvh; -webkit-font-smoothing: antialiased;
      padding-bottom: 40px;
    }
    .shell { max-width: 640px; margin: 0 auto; padding: 0 16px; }

    /* Top bar */
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 0 16px; gap: 10px; }
    .back-btn { border: none; background: rgba(255,255,255,0.5); border-radius: 14px; padding: 10px 16px; font-family: inherit; font-size: 14px; font-weight: 700; color: var(--ink); cursor: pointer; }
    .print-btn { border: none; background: #1F3D3A; border-radius: 14px; padding: 10px 18px; font-family: inherit; font-size: 14px; font-weight: 700; color: #E8F0EE; cursor: pointer; }
    [data-theme="dark"] .back-btn { background: rgba(255,255,255,0.10) !important; }

    /* Report header */
    .report-header { background: linear-gradient(135deg, #1F3D3A, #2A524F); border-radius: 24px; padding: 28px 24px; margin-bottom: 16px; color: #E8F0EE; }
    .report-eyebrow { font-size: 11px; font-weight: 800; letter-spacing: 0.10em; text-transform: uppercase; opacity: 0.65; margin-bottom: 10px; }
    .report-title { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 4px; }
    .report-sub { font-size: 13px; opacity: 0.75; margin-bottom: 18px; }
    .report-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .report-stat { background: rgba(255,255,255,0.10); border-radius: 14px; padding: 12px; text-align: center; }
    .report-stat-value { font-size: 22px; font-weight: 900; }
    .report-stat-label { font-size: 10px; font-weight: 700; opacity: 0.70; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.04em; }

    /* Score badge */
    .score-badge { display: inline-flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.15); border-radius: 12px; padding: 8px 14px; margin-bottom: 14px; }
    .score-badge-number { font-size: 24px; font-weight: 900; }
    .score-badge-label { font-size: 12px; font-weight: 700; opacity: 0.80; }

    /* Cards */
    .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 18px 20px; box-shadow: 0 6px 18px var(--card-shadow); margin-bottom: 12px; }
    .card h3 { font-size: 14px; font-weight: 800; color: var(--ink); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }

    /* Appliance rows */
    .appliance-row { padding: 10px 0; border-bottom: 1px solid rgba(90,125,140,0.10); }
    .appliance-row:last-child { border-bottom: none; }
    .appliance-name { font-size: 14px; font-weight: 700; color: var(--ink); }
    .appliance-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .appliance-tasks { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .task-badge-inline { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; margin-right: 4px; margin-top: 3px; }
    .badge-due  { background: rgba(198,90,58,0.14); color: #8A3E28; }
    .badge-soon { background: rgba(227,184,108,0.20); color: #7A5A18; }
    .badge-ok   { background: rgba(90,125,140,0.12); color: #355763; }
    [data-theme="dark"] .badge-due  { background: rgba(224,112,85,0.22) !important; color: #F09070 !important; }
    [data-theme="dark"] .badge-soon { background: rgba(227,184,108,0.22) !important; color: #F0C878 !important; }
    [data-theme="dark"] .badge-ok   { background: rgba(255,255,255,0.10) !important; color: #A8C8D4 !important; }

    /* History rows */
    .history-row { display: flex; justify-content: space-between; align-items: baseline; padding: 7px 0; border-bottom: 1px solid rgba(90,125,140,0.08); font-size: 13px; }
    .history-row:last-child { border-bottom: none; }
    .history-task { color: var(--ink); font-weight: 600; }
    .history-appliance { color: var(--muted); font-size: 11px; margin-top: 1px; }
    .history-date { color: var(--muted); font-size: 12px; white-space: nowrap; margin-left: 10px; }

    /* Savings */
    .savings-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(90,125,140,0.08); font-size: 13px; }
    .savings-row:last-child { border-bottom: none; }
    .savings-label { color: var(--muted); }
    .savings-value { font-weight: 800; }
    .green { color: var(--green); }
    .amber { color: var(--amber); }

    /* Footer */
    .report-footer { text-align: center; font-size: 11px; color: var(--muted); margin-top: 24px; line-height: 1.6; }

    /* Print */
    @media print {
      body { background: white !important; padding: 0; }
      .top-bar, .bottom-nav { display: none !important; }
      .report-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="top-bar">
    <button class="back-btn" onclick="history.back()">&larr; Back</button>
    <button class="print-btn" onclick="window.print()">&#128438; Print / Save PDF</button>
  </div>

  <div id="reportContent">
    <div style="text-align:center;padding:60px 0;color:var(--muted);">Building your report&hellip;</div>
  </div>

  <div class="report-footer" id="reportFooter"></div>
</div>

<script>
function getTodayDate() { return new Date().toISOString().split('T')[0]; }
function formatDate(d) {
  if (!d) return '—';
  const x = new Date(d + 'T00:00:00');
  return x.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function daysBetween(a, b) {
  return Math.round((new Date(b + 'T00:00:00') - new Date(a + 'T00:00:00')) / (1000 * 60 * 60 * 24));
}
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const APPLIANCE_LIFESPANS = {
  'HVAC':{avg:15,max:20},'Refrigerator':{avg:13,max:17},'Washer':{avg:11,max:14},
  'Dryer':{avg:13,max:16},'Dishwasher':{avg:10,max:13},'Water Heater':{avg:11,max:13},
  'Range Hood':{avg:14,max:18},'OTR Microwave':{avg:9,max:13},'Microwave':{avg:9,max:13}
};

const PRESET_SAVINGS = {
  fridge_filter:150,fridge_coils:300,fridge_gasket:80,
  dish_filter:150,dish_descale:80,dish_seals:250,
  washer_clean:100,washer_hoses:1500,washer_inlet:120,
  dryer_lint:400,dryer_vent:600,dryer_seals:200,
  hvac_filter:500,hvac_service:800,hvac_vents:100,
  wh_flush:400,wh_valve:800,wh_leaks:2000
};

function buildReport() {
  const apps = JSON.parse(localStorage.getItem('homefrontAppliances') || '[]').filter(function(a){ return !a.archived; });
  const profile = JSON.parse(localStorage.getItem('homefrontProfile') || '{}');
  const userName = localStorage.getItem('homefrontUserName') || '';
  const today = getTodayDate();
  const todayDate = new Date(today + 'T00:00:00');

  // Collect all history
  const allHistory = [];
  let totalSpent = 0, totalSaved = 0, tasksCompleted = 0;
  apps.forEach(function(a) {
    (a.tasks || []).forEach(function(t) {
      (t.history || []).forEach(function(h) {
        tasksCompleted++;
        if (h.cost != null) totalSpent += Number(h.cost);
        totalSaved += (PRESET_SAVINGS[t.key] || 0);
        allHistory.push({ taskTitle: t.title, appliance: a.name, completedAt: h.completedAt, cost: h.cost, note: h.note });
      });
    });
  });
  allHistory.sort(function(a,b){ return (b.completedAt||'').localeCompare(a.completedAt||''); });

  // Health score
  const allTasks = [];
  apps.forEach(function(a){ (a.tasks||[]).forEach(function(t){ allTasks.push({...t, appliance:a.name}); }); });
  const overdue = allTasks.filter(function(t){ return t.nextDueDate && daysBetween(today,t.nextDueDate)<0; }).length;
  const dueSoon = allTasks.filter(function(t){ return t.nextDueDate && daysBetween(today,t.nextDueDate)>=0 && daysBetween(today,t.nextDueDate)<=7; }).length;
  const taskScore = Math.max(0, 100 - (overdue*8) - (dueSoon*2));
  const score = Math.max(10, Math.min(100, Math.round(taskScore * 0.5 + 80 * 0.3 + (tasksCompleted>5?100:60) * 0.2)));
  const grade = score>=90?'A+':score>=80?'A':score>=70?'B':score>=60?'C+':score>=50?'C':'D';

  // Past-lifespan count
  const vets = apps.filter(function(a){
    if (!a.installedDate) return false;
    const age = (new Date() - new Date(a.installedDate)) / (1000*60*60*24*365.25);
    const ls = APPLIANCE_LIFESPANS[a.type];
    return ls && age >= ls.avg;
  });

  // Build appliance task status
  const appRows = apps.map(function(a) {
    const dueTasks = (a.tasks||[]).filter(function(t){ return t.nextDueDate && daysBetween(today,t.nextDueDate)<=0; });
    const soonTasks = (a.tasks||[]).filter(function(t){ return t.nextDueDate && daysBetween(today,t.nextDueDate)>0 && daysBetween(today,t.nextDueDate)<=30; });
    const age = a.installedDate ? Math.round((new Date()-new Date(a.installedDate))/(1000*60*60*24*365.25)*10)/10 : null;
    const ls = APPLIANCE_LIFESPANS[a.type];
    const lifeLabel = ls && age ? (age>=ls.max?'End of life range':age>=ls.avg?'Past average lifespan':age>=ls.avg*0.65?'Mid-life':'Prime years') : '';
    let badges = '';
    if (dueTasks.length)  badges += '<span class="task-badge-inline badge-due">'  + dueTasks.length  + ' overdue</span>';
    if (soonTasks.length) badges += '<span class="task-badge-inline badge-soon">' + soonTasks.length + ' due soon</span>';
    if (!dueTasks.length && !soonTasks.length) badges += '<span class="task-badge-inline badge-ok">On track</span>';
    return '<div class="appliance-row">' +
      '<div class="appliance-name">' + escapeHtml(a.name) + '</div>' +
      '<div class="appliance-meta">' + escapeHtml(a.type) + (a.model ? ' &middot; Model ' + escapeHtml(a.model) : '') + (a.serial ? ' &middot; S/N ' + escapeHtml(a.serial) : '') + (age ? ' &middot; ' + age + ' yrs old' + (lifeLabel?' &middot; '+lifeLabel:'') : '') + '</div>' +
      '<div class="appliance-tasks">' + badges + '</div>' +
    '</div>';
  }).join('');

  // Recent history rows (last 20)
  const histRows = allHistory.slice(0,20).map(function(h){
    return '<div class="history-row">' +
      '<div><div class="history-task">' + escapeHtml(h.taskTitle) + '</div><div class="history-appliance">' + escapeHtml(h.appliance) + '</div></div>' +
      '<div class="history-date">' + formatDate(h.completedAt) + (h.cost!=null?' &middot; $'+Number(h.cost).toFixed(2):'') + '</div>' +
    '</div>';
  }).join('') || '<p style="font-size:13px;color:var(--muted);">No maintenance history recorded yet.</p>';

  // Warranty alerts
  const warrantyRows = [];
  apps.forEach(function(a){
    (a.warranties||[]).forEach(function(w){
      if (!w.expiryDate) return;
      const dl = daysBetween(today, w.expiryDate);
      warrantyRows.push({ name: a.name, provider: w.provider, dl, expiry: w.expiryDate });
    });
  });
  warrantyRows.sort(function(a,b){ return a.dl-b.dl; });
  const warrantySection = warrantyRows.length
    ? '<div class="card"><h3>Warranty records</h3>' +
      warrantyRows.map(function(w){
        const msg = w.dl<0?'Expired '+formatDate(w.expiry):w.dl===0?'Expires today':'Expires '+formatDate(w.expiry)+' ('+w.dl+' days)';
        const color = w.dl<0?'var(--red)':w.dl<30?'var(--amber)':'var(--green)';
        return '<div class="savings-row"><div><div class="savings-label" style="color:var(--ink);font-weight:600;">'+escapeHtml(w.name)+'</div><div class="savings-label">'+escapeHtml(w.provider)+'</div></div><div class="savings-value" style="color:'+color+';">'+msg+'</div></div>';
      }).join('') + '</div>'
    : '';

  // Year built / home age
  const yearBuilt = profile.yearBuilt;
  const homeAge = yearBuilt ? new Date().getFullYear() - yearBuilt : null;

  // Render
  document.getElementById('reportContent').innerHTML =
    '<div class="report-header">' +
      '<div class="report-eyebrow">Homefront &bull; Home Maintenance Report</div>' +
      '<div class="report-title">' + (userName ? escapeHtml(userName) + '\'s Home' : 'Home Maintenance Report') + '</div>' +
      '<div class="report-sub">Generated ' + formatDate(today) + (homeAge ? ' &middot; Home built ' + yearBuilt + ' (' + homeAge + ' yrs)' : '') + '</div>' +
      '<div class="score-badge"><div class="score-badge-number">' + score + '</div><div class="score-badge-label">Home Health Score &bull; Grade ' + grade + '</div></div>' +
      '<div class="report-stats">' +
        '<div class="report-stat"><div class="report-stat-value">' + apps.length + '</div><div class="report-stat-label">Appliances</div></div>' +
        '<div class="report-stat"><div class="report-stat-value">' + tasksCompleted + '</div><div class="report-stat-label">Tasks done</div></div>' +
        '<div class="report-stat"><div class="report-stat-value">$' + totalSaved.toLocaleString('en-US',{maximumFractionDigits:0}) + '</div><div class="report-stat-label">Costs prevented</div></div>' +
      '</div>' +
    '</div>' +

    '<div class="card"><h3>Appliance status</h3>' +
      (appRows || '<p style="font-size:13px;color:var(--muted);">No appliances tracked yet.</p>') +
    '</div>' +

    '<div class="card"><h3>Savings summary</h3>' +
      '<div class="savings-row"><div class="savings-label">Total spent on maintenance</div><div class="savings-value amber">$' + totalSpent.toLocaleString('en-US',{maximumFractionDigits:0}) + '</div></div>' +
      '<div class="savings-row"><div class="savings-label">Potential repairs prevented</div><div class="savings-value green">$' + totalSaved.toLocaleString('en-US',{maximumFractionDigits:0}) + '</div></div>' +
      '<div class="savings-row"><div class="savings-label">Net protection value</div><div class="savings-value green">$' + (totalSaved-totalSpent).toLocaleString('en-US',{maximumFractionDigits:0}) + '</div></div>' +
      (vets.length?'<div class="savings-row" style="margin-top:8px;padding-top:10px;border-top:1px solid rgba(90,125,140,0.12);"><div class="savings-label" style="color:var(--amber);">' + vets.length + ' appliance' + (vets.length===1?' is':'s are') + ' past average lifespan &mdash; budget for replacement</div></div>':'') +
    '</div>' +

    '<div class="card"><h3>Recent maintenance history</h3>' + histRows + '</div>' +

    warrantySection;

  document.getElementById('reportFooter').innerHTML =
    'Generated by Homefront &bull; homefrontapp.com &bull; ' + formatDate(today) + '<br>' +
    'This report documents maintenance activity tracked in the Homefront app. All data is stored locally on the owner\'s device.';
}

buildReport();
</script>
</body>
</html>>
