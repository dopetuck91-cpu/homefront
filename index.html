<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1F3D3A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Homefront" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Homefront</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 30% 20%, rgba(227,184,108,0.18), transparent 50%),
        radial-gradient(circle at 70% 80%, rgba(90,125,140,0.14), transparent 50%),
        linear-gradient(160deg, #1F3D3A 0%, #2A524F 60%, #1A3835 100%);
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .lock-card {
      width: 100%;
      max-width: 380px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 32px;
      padding: 40px 32px 36px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.40);
      text-align: center;
      animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .lock-icon {
      font-size: 52px;
      display: block;
      margin-bottom: 18px;
    }

    .lock-title {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .lock-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .lock-input {
      width: 100%;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 16px 52px 16px 18px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      letter-spacing: 0.06em;
    }

    .lock-input::placeholder {
      color: rgba(255,255,255,0.35);
      letter-spacing: 0;
      font-weight: 400;
    }

    .lock-input:focus {
      border-color: rgba(227,184,108,0.7);
      background: rgba(255,255,255,0.14);
      box-shadow: 0 0 0 4px rgba(227,184,108,0.18);
    }

    .lock-input.error {
      border-color: rgba(224,112,85,0.8);
      box-shadow: 0 0 0 4px rgba(224,112,85,0.18);
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-6px); }
      80%      { transform: translateX(4px); }
    }

    .toggle-visibility {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.45);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      transition: color 0.18s ease;
    }
    .toggle-visibility:hover { color: rgba(255,255,255,0.8); }

    .lock-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: #E3B86C;
      color: #1F3D3A;
      box-shadow: 0 10px 24px rgba(227,184,108,0.30);
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      letter-spacing: 0.01em;
    }

    .lock-btn:hover {
      transform: translateY(-2px);
      background: #ECC97A;
      box-shadow: 0 14px 30px rgba(227,184,108,0.38);
    }

    .lock-btn:active {
      transform: translateY(0);
    }

    .error-msg {
      margin-top: 14px;
      font-size: 13px;
      color: rgba(224,112,85,0.9);
      min-height: 18px;
      transition: opacity 0.2s ease;
    }

    .attempts-msg {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }

    .lock-footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 12px;
      color: rgba(255,255,255,0.28);
      line-height: 1.6;
    }

    [data-theme="dark"] body {
      background: #1A2826 !important;
      color: #E8F0EE !important;
    }
  </style>
  <script>
    (function() {
      try {
        var s = JSON.parse(localStorage.getItem('homefrontSettings') || '{}');
        if (s.darkModeEnabled) document.documentElement.setAttribute('data-theme', 'dark');
      } catch(e) {}
    })();
  </script>
  <script>
    (function() {
      try {
        var s = JSON.parse(localStorage.getItem('homefrontSettings') || '{}');
        if (s.darkModeEnabled) document.documentElement.setAttribute('data-theme', 'dark');
      } catch(e) {}
    })();
  </script>
</head>
<body>

<div class="lock-card">
  <span class="lock-icon">🏠</span>
  <h1 class="lock-title">Homefront</h1>
  <p class="lock-sub">Your home deserves better than a forgotten filter change.<br>Enter your access code to continue.</p>

  <div class="input-wrap">
    <input
      class="lock-input"
      id="passwordInput"
      type="password"
      placeholder="Access code"
      autocomplete="current-password"
      autocorrect="off"
      autocapitalize="none"
      spellcheck="false"
    />
    <button class="toggle-visibility" id="toggleBtn" onclick="toggleVisibility()" type="button">👁</button>
  </div>

  <button class="lock-btn" onclick="checkPassword()">Enter →</button>

  <p class="error-msg" id="errorMsg"></p>
  <p class="attempts-msg" id="attemptsMsg"></p>

  <div class="lock-footer">
    Homefront · Early access · Built for homeowners
  </div>
</div>

<script>
  /* ─────────────────────────────────────────
     🔑 SET YOUR PASSWORD HERE
     Change the value below to whatever you want.
     It's the only thing you need to edit.
  ───────────────────────────────────────── */
  const ACCESS_PASSWORD = 'homecare2026';
  /* ───────────────────────────────────────── */

  const SESSION_KEY  = 'homefrontAccess';
  const ATTEMPTS_KEY = 'homefrontAttempts';
  const LOCKOUT_KEY  = 'homefrontLockout';
  const MAX_ATTEMPTS = 5;
  const LOCKOUT_MINS = 10;

  // If already authenticated this session, skip straight in
  if (sessionStorage.getItem(SESSION_KEY) === 'granted') {
    location.replace('home.html');
  }

  function isLockedOut() {
    const lockUntil = localStorage.getItem(LOCKOUT_KEY);
    if (!lockUntil) return false;
    if (Date.now() < Number(lockUntil)) return true;
    // Lockout expired — clear it
    localStorage.removeItem(LOCKOUT_KEY);
    localStorage.removeItem(ATTEMPTS_KEY);
    return false;
  }

  function getAttempts() {
    return parseInt(localStorage.getItem(ATTEMPTS_KEY) || '0', 10);
  }

  function recordFailedAttempt() {
    const attempts = getAttempts() + 1;
    localStorage.setItem(ATTEMPTS_KEY, String(attempts));
    if (attempts >= MAX_ATTEMPTS) {
      const lockUntil = Date.now() + LOCKOUT_MINS * 60 * 1000;
      localStorage.setItem(LOCKOUT_KEY, String(lockUntil));
    }
    return attempts;
  }

  function checkPassword() {
    const input = document.getElementById('passwordInput');
    const errorMsg = document.getElementById('errorMsg');
    const attemptsMsg = document.getElementById('attemptsMsg');

    if (isLockedOut()) {
      const lockUntil = Number(localStorage.getItem(LOCKOUT_KEY));
      const minsLeft  = Math.ceil((lockUntil - Date.now()) / 60000);
      errorMsg.textContent = 'Too many attempts. Try again in ' + minsLeft + ' minute' + (minsLeft === 1 ? '' : 's') + '.';
      attemptsMsg.textContent = '';
      input.classList.add('error');
      setTimeout(function() { input.classList.remove('error'); }, 500);
      return;
    }

    if (input.value.trim() === ACCESS_PASSWORD) {
      // Correct — grant access for this session
      sessionStorage.setItem(SESSION_KEY, 'granted');
      localStorage.removeItem(ATTEMPTS_KEY);
      localStorage.removeItem(LOCKOUT_KEY);
      errorMsg.textContent = '';
      location.replace('home.html');
    } else {
      const attempts = recordFailedAttempt();
      input.classList.add('error');
      input.value = '';
      setTimeout(function() { input.classList.remove('error'); }, 500);

      if (attempts >= MAX_ATTEMPTS) {
        errorMsg.textContent = 'Too many attempts. Locked for ' + LOCKOUT_MINS + ' minutes.';
        attemptsMsg.textContent = '';
      } else {
        const remaining = MAX_ATTEMPTS - attempts;
        errorMsg.textContent = 'Incorrect access code.';
        attemptsMsg.textContent = remaining + ' attempt' + (remaining === 1 ? '' : 's') + ' remaining before lockout.';
      }
    }
  }

  function toggleVisibility() {
    const input = document.getElementById('passwordInput');
    const btn   = document.getElementById('toggleBtn');
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁';
    }
  }

  // Allow Enter key to submit
  document.getElementById('passwordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });

  // Show lockout state on load if already locked
  window.addEventListener('load', function() {
    if (isLockedOut()) {
      const lockUntil = Number(localStorage.getItem(LOCKOUT_KEY));
      const minsLeft  = Math.ceil((lockUntil - Date.now()) / 60000);
      document.getElementById('errorMsg').textContent =
        'Too many attempts. Try again in ' + minsLeft + ' minute' + (minsLeft === 1 ? '' : 's') + '.';
    }
    document.getElementById('passwordInput').focus();
  });
</script>

</body>
</html>
