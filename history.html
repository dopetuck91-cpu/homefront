  <style>
    * { box-sizing: border-box; }

    :root {
      --bg1: #EDE6E1; --bg2: #E7DFD9;
      --ink: #1F3D3A; --muted: #5A7D8C;
      --accent: #E3B86C; --danger: #8A3E28;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top, rgba(227,184,108,0.12), transparent 28%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      color: var(--ink);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    .app-shell {
      max-width: 460px;
      margin: 0 auto;
      padding: 14px 20px 110px;
      min-height: 100dvh;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      position: sticky; top: 0; z-index: 20;
      padding: 10px 0 12px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .back-btn {
      width: 42px; height: 42px; border: none;
      border-radius: 14px; background: rgba(255,255,255,0.5);
      color: var(--ink); font-size: 18px; cursor: pointer;
      box-shadow: 0 6px 14px rgba(31,61,58,0.08);
      transition: transform 0.18s ease;
    }
    .back-btn:hover { transform: translateY(-1px); }

    .app-status {
      font-size: 12px; font-weight: 700; color: var(--muted);
      margin: 2px 0 10px;
      display: flex; justify-content: space-between;
    }

    .eyebrow {
      font-size: 12px; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted);
      margin-bottom: 6px; font-weight: 700;
    }

    .page-title { margin: 0; font-size: 28px; line-height: 1.1; }
    .page-sub   { margin: 8px 0 0; color: var(--muted); font-size: 14px; line-height: 1.5; }

    /* ── summary chips ── */
    .summary-row {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin: 16px 0 0;
    }

    .summary-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px; font-weight: 700;
      box-shadow: 0 6px 14px rgba(31,61,58,0.06);
    }

    /* ── filter bar ── */
    .filter-bar {
      margin-top: 18px;
      display: grid; gap: 10px;
    }

    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .filter-bar select,
    .filter-bar input[type="text"] {
      width: 100%;
      border: 1px solid rgba(90,125,140,0.16);
      border-radius: 14px;
      padding: 11px 14px;
      font: inherit; font-size: 13px;
      background: rgba(255,255,255,0.82);
      color: var(--ink); outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .filter-bar select:focus,
    .filter-bar input[type="text"]:focus {
      border-color: rgba(31,61,58,0.35);
      box-shadow: 0 0 0 4px rgba(227,184,108,0.14);
    }

    /* ── history list ── */
    .history-list {
      display: grid; gap: 12px;
      margin-top: 20px;
    }

    .history-card {
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 10px 20px rgba(31,61,58,0.06);
    }

    .history-card-top {
      display: flex; justify-content: space-between;
      align-items: start; gap: 12px; margin-bottom: 8px;
    }

    .history-card-title {
      font-size: 15px; font-weight: 700; margin: 0 0 3px;
    }

    .history-card-appliance {
      font-size: 12px; color: var(--muted); margin: 0;
    }

    .history-card-date {
      font-size: 12px; font-weight: 700; color: var(--muted);
      white-space: nowrap; flex-shrink: 0;
    }

    .history-note {
      margin: 8px 0 0;
      padding: 9px 12px;
      border-radius: 12px;
      background: rgba(90,125,140,0.08);
      font-size: 13px; color: var(--ink); line-height: 1.45;
    }

    .history-meta-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 10px;
    }

    .history-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 10px; border-radius: 999px;
      background: rgba(90,125,140,0.10);
      font-size: 12px; font-weight: 600; color: var(--ink);
    }

    .history-pill.cost  { background: rgba(227,184,108,0.20); color: #7A5A18; }
    .history-pill.who   { background: rgba(31,61,58,0.08);    color: var(--ink); }
    .history-pill.filter{ background: rgba(90,125,140,0.14);  color: #355763; }

    .history-photos {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 10px;
    }

    .history-photo-thumb {
      width: 72px; height: 72px;
      object-fit: cover; border-radius: 10px;
      cursor: pointer;
      transition: transform 0.18s ease;
    }
    .history-photo-thumb:hover { transform: scale(1.04); }

    .empty-state {
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 22px; padding: 20px;
      box-shadow: 0 10px 20px rgba(31,61,58,0.06);
      text-align: center;
    }
    .empty-state h3 { margin: 0 0 8px; font-size: 16px; }
    .empty-state p  { margin: 0; font-size: 14px; color: var(--muted); line-height: 1.5; }

    /* ── lightbox ── */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      display: none; align-items: center; justify-content: center;
      z-index: 80; padding: 20px;
    }
    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 100%; max-height: 90vh;
      border-radius: 16px;
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute; top: 18px; right: 18px;
      width: 42px; height: 42px; border-radius: 50%;
      border: none; background: rgba(255,255,255,0.18);
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── bottom nav ── */
    .bottom-nav {
      position: fixed; left: 50%; bottom: 18px;
      transform: translateX(-50%);
      width: min(420px, calc(100% - 24px));
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.76);
      box-shadow: 0 16px 30px rgba(31,61,58,0.14);
      border-radius: 24px;
      display: grid; grid-template-columns: repeat(4, 1fr);
      padding: 10px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .nav-item {
      text-align: center; color: var(--muted);
      font-size: 11px; font-weight: 600;
      padding: 8px 4px; border-radius: 16px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
    }
    .nav-item i { display: block; font-size: 18px; margin-bottom: 5px; }
    .nav-item.active { background: rgba(31,61,58,0.08); color: var(--ink); }
    .nav-item:hover  { transform: translateY(-1px); }

    @media (max-width: 420px) {
      .filter-row { grid-template-columns: 1fr; }
      .history-card-top { flex-direction: column; }
    }

  [data-theme="dark"] .add-appliance-btn:hover,
  [data-theme="dark"] .save-btn.primary:hover,
  [data-theme="dark"] .save-reminder-btn:hover,
  [data-theme="dark"] .save-estimates-btn:hover,
  [data-theme="dark"] .onboard-btn.primary:hover,
  [data-theme="dark"] .export-btn.primary:hover {
    background: #3A6E6A !important;
  }

  /* Toast — was using var(--ink) which goes white in dark mode */
  [data-theme="dark"] .toast {
    background: #2A524F !important;
    color: #E8F0EE !important;
    box-shadow: 0 12px 24px rgba(0,0,0,0.40) !important;
  }

  /* Carousel arrows */
  [data-theme="dark"] .carousel-arrow {
    background: rgba(255,255,255,0.08) !important;
    color: #E8F0EE !important;
  }

  /* Archive toggle */
  [data-theme="dark"] .archive-toggle {
    background: rgba(255,255,255,0.08) !important;
    color: #E8F0EE !important;
  }


  /* Force select dropdowns dark — prevents white popup in dark mode */
  [data-theme="dark"] select {
    background: #1A2826 !important;
    color: #E8F0EE !important;
    color-scheme: dark;
  }
  [data-theme="dark"] select option {
    background: #1A2826 !important;
    color: #E8F0EE !important;
  }
  [data-theme="dark"] select optgroup {
    background: #141F1E !important;
    color: #A8C8D4 !important;
  }

  </style>
  <script>
    /* ── Dark mode — apply before paint to prevent flash ── */
    (function() {
      try {
        var s = JSON.parse(localStorage.getItem('homefrontSettings') || '{}');
        if (s.darkModeEnabled) document.documentElement.setAttribute('data-theme', 'dark');
      } catch(e) {}
    })();
  </script>
</head>
<body>
<div class="app-shell">

  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">←</button>
  </div>

  <div class="app-status"><span id="pageClock">9:41</span><span>• Connected</span></div>

  <div class="eyebrow">Maintenance History</div>
  <h1 class="page-title" id="pageTitle">Full history</h1>
  <p class="page-sub" id="pageSub">Every logged maintenance completion across your appliances.</p>

  <div class="summary-row" id="summaryRow"></div>

  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍  Search by task or appliance…" oninput="applyFilters()" />
    <div class="filter-row">
      <select id="applianceFilter" onchange="applyFilters()">
        <option value="">All appliances</option>
      </select>
      <select id="whoFilter" onchange="applyFilters()">
        <option value="">Anyone</option>
        <option value="self">Myself</option>
        <option value="contractor">Contractor</option>
      </select>
    </div>
    <div class="filter-row">
      <select id="sortFilter" onchange="applyFilters()">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="cost_high">Highest cost</option>
      </select>
      <select id="categoryFilter" onchange="applyFilters()">
        <option value="">All categories</option>
        <option value="filter">Filter tasks</option>
        <option value="cleaning">Cleaning</option>
        <option value="inspection">Inspection</option>
        <option value="service">Service</option>
        <option value="maintenance">Maintenance</option>
        <option value="custom">Custom</option>
      </select>
    </div>
  </div>

  <div class="history-list" id="historyList"></div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="Photo" onclick="event.stopPropagation()" />
</div>

<nav class="bottom-nav">
  <div class="nav-item" onclick="location.href='home.html'"><i class="ph ph-house"></i>Home</div>
  <div class="nav-item active" onclick="location.href='appliances.html'"><i class="ph ph-wrench"></i>Appliances</div>
  <div class="nav-item" onclick="location.href='systems.html'"><i class="ph ph-buildings"></i>Systems</div>
  <div class="nav-item" onclick="location.href='settings.html'"><i class="ph ph-gear"></i>Settings</div>
</nav>

<script>

    /* ── Dark mode apply ── */
    function applyDarkMode() {
      try {
        const settings = JSON.parse(localStorage.getItem('homefrontSettings') || '{}');
        if (settings.darkModeEnabled) {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.removeAttribute('data-theme');
        }
      } catch(e) {}
    }

    // Apply immediately on load (before render)
    applyDarkMode();

    // React to changes from other tabs or the settings page
    window.addEventListener('storage', function(e) {
      if (e.key === 'homefrontSettings') applyDarkMode();
    });

/* ─── Storage ─── */
const STORAGE_KEYS = { appliances: 'homefrontAppliances' };

function getUserAppliances() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.appliances) || '[]'); }
  catch { return []; }
}

/* ─── Date helpers ─── */
function getTodayDate() { return new Date().toISOString().split('T')[0]; }

function formatDate(ds) {
  if (!ds) return 'Unknown date';
  return new Date(ds + 'T00:00:00').toLocaleDateString(undefined, {
    month: 'short', day: 'numeric', year: 'numeric'
  });
}

function escapeHtml(v) {
  return String(v || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ─── Build flat history rows from all appliances ─── */
function buildAllHistory() {
  const appliances = getUserAppliances();
  const rows = [];

  appliances.forEach(function(appliance) {
    (appliance.tasks || []).forEach(function(task) {
      (task.history || []).forEach(function(entry) {
        rows.push({
          applianceId:   appliance.id,
          applianceName: appliance.name,
          applianceType: appliance.type,
          applianceLoc:  appliance.location || '',
          taskId:        task.id,
          taskTitle:     task.title,
          taskCategory:  task.category || 'maintenance',
          completedAt:   entry.completedAt || '',
          who:           entry.who   || null,
          note:          entry.note  || '',
          cost:          entry.cost  != null ? entry.cost : null,
          filterBrand:   entry.filterBrand || null,
          filterSize:    entry.filterSize  || null,
          photos:        Array.isArray(entry.photos) ? entry.photos : []
        });
      });
    });
  });

  return rows;
}

/* ─── Filters & rendering ─── */
let allRows = [];

function applyFilters() {
  const search    = document.getElementById('searchInput').value.toLowerCase();
  const appliance = document.getElementById('applianceFilter').value;
  const who       = document.getElementById('whoFilter').value;
  const sort      = document.getElementById('sortFilter').value;
  const category  = document.getElementById('categoryFilter').value;

  let filtered = allRows.filter(function(r) {
    if (appliance && r.applianceId !== appliance) return false;
    if (who && r.who !== who) return false;
    if (category && r.taskCategory !== category) return false;
    if (search && !(
      r.taskTitle.toLowerCase().includes(search) ||
      r.applianceName.toLowerCase().includes(search) ||
      (r.note || '').toLowerCase().includes(search)
    )) return false;
    return true;
  });

  if (sort === 'oldest') {
    filtered.sort(function(a,b) { return (a.completedAt||'').localeCompare(b.completedAt||''); });
  } else if (sort === 'cost_high') {
    filtered.sort(function(a,b) { return (b.cost||0) - (a.cost||0); });
  } else {
    filtered.sort(function(a,b) { return (b.completedAt||'').localeCompare(a.completedAt||''); });
  }

  renderList(filtered);
}

function renderList(rows) {
  const container = document.getElementById('historyList');

  if (!rows.length) {
    container.innerHTML = `
      <div class="empty-state">
        <h3>No maintenance history yet</h3>
        <p>Every task you complete gets logged here — costs, photos, notes, and who did the work. Head to Appliances and mark your first task complete to get started.</p>
      </div>`;
    return;
  }

  container.innerHTML = rows.map(function(item) {
    const pills = [];
    if (item.who)           pills.push({ cls: 'who',    text: item.who === 'contractor' ? '🔧 Contractor' : '🙋 Myself' });
    if (item.cost != null)  pills.push({ cls: 'cost',   text: '💲' + Number(item.cost).toFixed(2) });
    if (item.filterBrand || item.filterSize) {
      pills.push({ cls: 'filter', text: '🔲 ' + [item.filterBrand, item.filterSize].filter(Boolean).join(' ') });
    }

    const pillsHtml = pills.map(function(p) {
      return `<span class="history-pill ${p.cls}">${escapeHtml(p.text)}</span>`;
    }).join('');

    const photosHtml = item.photos.slice(0, 6).map(function(ph) {
      return `<img class="history-photo-thumb" src="${ph.dataUrl}" alt="Photo" onclick="openLightbox('${ph.dataUrl}')" />`;
    }).join('');

    return `
      <div class="history-card">
        <div class="history-card-top">
          <div>
            <p class="history-card-title">${escapeHtml(item.taskTitle)}</p>
            <p class="history-card-appliance">${escapeHtml(item.applianceName)} • ${escapeHtml(item.applianceType)}${item.applianceLoc ? ' • ' + escapeHtml(item.applianceLoc) : ''}</p>
          </div>
          <span class="history-card-date">${formatDate(item.completedAt)}</span>
        </div>

        ${item.note ? `<div class="history-note">${escapeHtml(item.note)}</div>` : ''}

        ${pillsHtml ? `<div class="history-meta-row">${pillsHtml}</div>` : ''}

        ${photosHtml ? `<div class="history-photos">${photosHtml}</div>` : ''}
      </div>
    `;
  }).join('');
}

/* ─── Summary chips ─── */
function renderSummary(rows) {
  const total     = rows.length;
  const totalCost = rows.reduce(function(s,r) { return s + (r.cost || 0); }, 0);
  const withPhotos = rows.filter(function(r) { return r.photos.length > 0; }).length;

  const chips = [
    { label: total + ' record' + (total === 1 ? '' : 's') },
    totalCost > 0 ? { label: '💲' + totalCost.toFixed(2) + ' total spent' } : null,
    withPhotos > 0 ? { label: '📷 ' + withPhotos + ' with photos' } : null
  ].filter(Boolean);

  document.getElementById('summaryRow').innerHTML = chips.map(function(c) {
    return `<div class="summary-chip">${escapeHtml(c.label)}</div>`;
  }).join('');
}

/* ─── Appliance filter options ─── */
function populateApplianceFilter(rows) {
  const seen = {};
  const opts = ['<option value="">All appliances</option>'];
  rows.forEach(function(r) {
    if (!seen[r.applianceId]) {
      seen[r.applianceId] = true;
      opts.push(`<option value="${escapeHtml(r.applianceId)}">${escapeHtml(r.applianceName)}</option>`);
    }
  });
  document.getElementById('applianceFilter').innerHTML = opts.join('');
}

/* ─── Lightbox ─── */
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxImg').src = '';
}

/* ─── URL param — pre-filter to one appliance ─── */
function applyUrlParam() {
  const params     = new URLSearchParams(window.location.search);
  const focusId    = params.get('appliance');
  const appliances = getUserAppliances();

  if (focusId) {
    const app = appliances.find(function(a) { return a.id === focusId; });
    if (app) {
      document.getElementById('pageTitle').textContent = app.name + ' history';
      document.getElementById('pageSub').textContent   = 'All maintenance records for this appliance.';
      document.getElementById('applianceFilter').value = focusId;
    }
  }
}

/* ─── Clock ─── */
function updateClock() {
  const el = document.getElementById('pageClock');
  if (el) el.textContent = new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

/* ─── Nav ─── */
function goBack() {
  if (document.referrer) { history.back(); } else { location.href = 'appliances.html'; }
}

/* ─── Init ─── */
allRows = buildAllHistory();
populateApplianceFilter(allRows);
renderSummary(allRows);
applyUrlParam();
applyFilters();
updateClock();
setInterval(updateClock, 30000);
</script>

  <script>
    /* ── Service Worker registration ── */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js')
          .then(function(reg) {
            console.log('SW registered:', reg.scope);
          })
          .catch(function(err) {
            console.log('SW registration failed:', err);
          });
      });
    }
  </script>
</body>
</html>
