<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function() {
      if (sessionStorage.getItem('homefrontAccess') !== 'granted') location.replace('index.html');
    })();
  </script>
  <script>
    (function() {
      try {
        var s = JSON.parse(localStorage.getItem('homefrontSettings') || '{}');
        if (s.darkModeEnabled) document.documentElement.setAttribute('data-theme', 'dark');
      } catch(e) {}
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1F3D3A" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1A2826" media="(prefers-color-scheme: dark)" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Homefront &bull; Home Timeline</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg1: #EDE6E1; --bg2: #E7DFD9; --ink: #1F3D3A; --muted: #5A7D8C;
      --card-bg: rgba(255,255,255,0.84); --card-border: rgba(255,255,255,0.72);
      --card-shadow: rgba(31,61,58,0.06);
      --nav-bg: rgba(255,255,255,0.82); --nav-border: rgba(255,255,255,0.76);
      --nav-active-bg: rgba(31,61,58,0.08);
      --line-color: rgba(90,125,140,0.20);
    }
    [data-theme="dark"] {
      --bg1: #1A2826; --bg2: #141F1E; --ink: #E8F0EE; --muted: #A8C8D4;
      --card-bg: rgba(255,255,255,0.06); --card-border: rgba(255,255,255,0.08);
      --card-shadow: rgba(0,0,0,0.28);
      --nav-bg: rgba(20,31,30,0.95); --nav-border: rgba(255,255,255,0.08);
      --nav-active-bg: rgba(255,255,255,0.08);
      --line-color: rgba(168,200,212,0.15);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, rgba(227,184,108,0.12), transparent 28%),
                  linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      color: var(--ink); min-height: 100dvh; -webkit-font-smoothing: antialiased;
      padding-bottom: 90px;
    }
    .shell { max-width: 480px; margin: 0 auto; padding: 0 16px 16px; }

    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 0 10px; }
    .back-btn { border: none; background: rgba(255,255,255,0.5); border-radius: 14px; padding: 10px 16px; font-family: inherit; font-size: 14px; font-weight: 700; color: var(--ink); cursor: pointer; box-shadow: 0 4px 10px rgba(31,61,58,0.08); }
    [data-theme="dark"] .back-btn { background: rgba(255,255,255,0.09) !important; }

    .page-eyebrow { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
    .page-title { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 4px; }
    .page-sub { font-size: 14px; color: var(--muted); line-height: 1.5; margin-bottom: 20px; }

    /* Stats strip */
    .stats-strip { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
    .stat-pill { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 12px 10px; text-align: center; box-shadow: 0 4px 12px var(--card-shadow); }
    .stat-value { font-size: 20px; font-weight: 900; color: var(--ink); }
    .stat-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 3px; }

    /* Year group */
    .year-group { margin-bottom: 28px; }
    .year-label { font-size: 22px; font-weight: 900; color: var(--ink); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
    .year-count { font-size: 13px; font-weight: 600; color: var(--muted); }

    /* Timeline item */
    .timeline-wrap { position: relative; padding-left: 32px; }
    .timeline-wrap::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: var(--line-color); border-radius: 2px; }

    .timeline-item { position: relative; margin-bottom: 10px; }
    .timeline-dot { position: absolute; left: -27px; top: 14px; width: 12px; height: 12px; border-radius: 99px; background: #5A7D8C; border: 2px solid var(--bg1); z-index: 1; }
    .timeline-dot.maintenance { background: #2A7A4A; }
    .timeline-dot.warning     { background: #C47A28; }
    .timeline-dot.added       { background: #5A7D8C; }
    .timeline-dot.seasonal    { background: #4A8A9A; }
    .timeline-dot.milestone   { background: #E3B86C; }
    [data-theme="dark"] .timeline-dot { border-color: var(--bg2) !important; }

    .timeline-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 16px; padding: 12px 14px;
      box-shadow: 0 4px 12px var(--card-shadow);
    }
    .timeline-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .timeline-task { font-size: 14px; font-weight: 700; color: var(--ink); line-height: 1.3; }
    .timeline-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .timeline-date { font-size: 11px; font-weight: 700; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .timeline-cost { font-size: 12px; font-weight: 700; color: #2A7A4A; margin-top: 4px; }
    .timeline-note { font-size: 12px; color: var(--muted); margin-top: 6px; font-style: italic; line-height: 1.4; }
    .timeline-tag { display: inline-block; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 99px; margin-right: 4px; margin-top: 5px; }
    .tag-maintenance { background: rgba(42,122,74,0.12); color: #2A7A4A; }
    .tag-added       { background: rgba(90,125,140,0.12); color: #355763; }
    .tag-seasonal    { background: rgba(74,138,154,0.12); color: #2A6A7A; }
    .tag-milestone   { background: rgba(227,184,108,0.20); color: #7A5A18; }
    [data-theme="dark"] .tag-maintenance { background: rgba(42,122,74,0.22) !important; color: #6FC98A !important; }
    [data-theme="dark"] .tag-added       { background: rgba(255,255,255,0.10) !important; color: #A8C8D4 !important; }
    [data-theme="dark"] .tag-seasonal    { background: rgba(74,138,154,0.18) !important; color: #7AC4D4 !important; }
    [data-theme="dark"] .tag-milestone   { background: rgba(227,184,108,0.20) !important; color: #F0C878 !important; }

    /* Empty state */
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty h3 { font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
    .empty p { font-size: 14px; line-height: 1.6; }
    .empty-btn { display: inline-block; margin-top: 16px; border: none; border-radius: 14px; padding: 12px 24px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; background: var(--ink); color: #E8F0EE; }

    /* Nav */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav-bg); border-top: 1px solid var(--nav-border); display: flex; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px 8px; font-size: 10px; font-weight: 600; color: var(--muted); cursor: pointer; border-radius: 14px; transition: color 0.18s ease, background 0.18s ease; }
    .nav-item i { font-size: 22px; display: block; line-height: 1.1; color: inherit; }
    .nav-item.active { color: var(--ink); background: var(--nav-active-bg); }
  </style>
</head>
<body>
<div class="shell">
  <div class="top-bar">
    <button class="back-btn" onclick="history.back()">&larr; Back</button>
    <button style="border:none;background:none;color:var(--muted);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;" onclick="location.href='report.html'">Full report &rarr;</button>
  </div>

  <div class="page-eyebrow">Home timeline</div>
  <h1 class="page-title">Your home's complete record.</h1>
  <p class="page-sub">Every task completed, appliance added, and seasonal checklist — all in one place. This is what you show at resale.</p>

  <div class="stats-strip" id="statsStrip"></div>
  <div id="timelineContent"></div>
</div>

<nav class="bottom-nav">
  <div class="nav-item" onclick="location.href='home.html'"><i class="ph ph-house"></i>Home</div>
  <div class="nav-item" onclick="location.href='appliances.html'"><i class="ph ph-wrench"></i>Appliances</div>
  <div class="nav-item" onclick="location.href='systems.html'"><i class="ph ph-buildings"></i>Systems</div>
  <div class="nav-item" onclick="location.href='settings.html'"><i class="ph ph-gear"></i>Settings</div>
</nav>

<script>
function formatDate(d) {
  if (!d) return '';
  const x = new Date(d + 'T00:00:00');
  return x.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function formatDateFull(d) {
  if (!d) return '';
  const x = new Date(d + 'T00:00:00');
  return x.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}
function escapeHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildTimeline() {
  const apps = JSON.parse(localStorage.getItem('homefrontAppliances') || '[]');
  const profile = JSON.parse(localStorage.getItem('homefrontProfile') || '{}');
  const seasonal = JSON.parse(localStorage.getItem('homefrontSeasonalData') || '{}');
  const systems  = JSON.parse(localStorage.getItem('homefrontSystemsData') || '{}');

  const events = [];
  let totalSpent = 0, totalSaved = 0, totalTasks = 0;

  const PRESET_SAVINGS = {
    fridge_filter:150,fridge_coils:300,fridge_gasket:80,
    dish_filter:150,dish_descale:80,dish_seals:250,
    washer_clean:100,washer_hoses:1500,washer_inlet:120,
    dryer_lint:400,dryer_vent:600,dryer_seals:200,
    hvac_filter:500,hvac_service:800,hvac_vents:100,
    wh_flush:400,wh_valve:800,wh_leaks:2000,
    generic_clean:100,generic_inspect:150
  };

  // Appliance added events
  apps.forEach(function(a) {
    if (a.addedAt || a.installedDate) {
      events.push({
        date: (a.addedAt || a.installedDate + 'T00:00:00').split('T')[0],
        type: 'added',
        title: a.name + ' added to Homefront',
        meta: a.type + (a.model ? ' \u00b7 Model ' + a.model : '') + (a.location ? ' \u00b7 ' + a.location : ''),
        dot: 'added',
        tag: 'tag-added', tagLabel: 'Added'
      });
    }

    // Task completion events
    (a.tasks || []).forEach(function(t) {
      (t.history || []).forEach(function(h) {
        totalTasks++;
        if (h.cost != null) totalSpent += Number(h.cost);
        totalSaved += (PRESET_SAVINGS[t.key] || 0);
        events.push({
          date: h.completedAt,
          type: 'maintenance',
          title: t.title,
          meta: a.name,
          cost: h.cost,
          note: h.note,
          dot: 'maintenance',
          tag: 'tag-maintenance', tagLabel: 'Maintenance'
        });
      });
    });
  });

  // Seasonal completions
  Object.entries(seasonal).forEach(function(entry) {
    const key = entry[0], val = entry[1];
    if (val && val.completedAt) {
      const season = key.split('_')[0];
      const label = season.charAt(0).toUpperCase() + season.slice(1);
      events.push({
        date: val.completedAt,
        type: 'seasonal',
        title: label + ' seasonal checklist completed',
        meta: val.itemsCompleted ? val.itemsCompleted + ' tasks checked off' : '',
        dot: 'seasonal',
        tag: 'tag-seasonal', tagLabel: label
      });
    }
  });

  // Systems tasks
  Object.entries(systems).forEach(function(entry) {
    const key = entry[0], val = entry[1];
    if (val && val.lastCompleted) {
      events.push({
        date: val.lastCompleted,
        type: 'maintenance',
        title: (val.title || key.replace(/_/g,' ')),
        meta: 'Home systems',
        dot: 'maintenance',
        tag: 'tag-maintenance', tagLabel: 'Systems'
      });
    }
  });

  // Sort newest first
  events.sort(function(a,b) { return (b.date||'').localeCompare(a.date||''); });

  // Stats strip
  document.getElementById('statsStrip').innerHTML =
    '<div class="stat-pill"><div class="stat-value">' + totalTasks + '</div><div class="stat-label">Tasks done</div></div>' +
    '<div class="stat-pill"><div class="stat-value" style="color:#2A7A4A;">$' + totalSaved.toLocaleString('en-US',{maximumFractionDigits:0}) + '</div><div class="stat-label">Protected</div></div>' +
    '<div class="stat-pill"><div class="stat-value">' + apps.filter(function(a){return !a.archived;}).length + '</div><div class="stat-label">Appliances</div></div>';

  if (!events.length) {
    document.getElementById('timelineContent').innerHTML =
      '<div class="empty">' +
        '<div class="empty-icon">&#128336;</div>' +
        '<h3>Your timeline starts here</h3>' +
        '<p>Every maintenance task you complete, every appliance you add, and every seasonal checklist you finish will appear here — building your home\'s permanent record.</p>' +
        '<button class="empty-btn" onclick="location.href=\'appliances.html\'">Add your first appliance &rarr;</button>' +
      '</div>';
    return;
  }

  // Group by year
  const byYear = {};
  events.forEach(function(e) {
    if (!e.date) return;
    const yr = e.date.split('-')[0];
    if (!byYear[yr]) byYear[yr] = [];
    byYear[yr].push(e);
  });

  const years = Object.keys(byYear).sort(function(a,b){ return b-a; });
  let html = '';
  years.forEach(function(yr) {
    const items = byYear[yr];
    html += '<div class="year-group">' +
      '<div class="year-label">' + yr + '<span class="year-count">' + items.length + ' event' + (items.length===1?'':'s') + '</span></div>' +
      '<div class="timeline-wrap">';
    items.forEach(function(e) {
      html += '<div class="timeline-item">' +
        '<div class="timeline-dot ' + e.dot + '"></div>' +
        '<div class="timeline-card">' +
          '<div class="timeline-card-top">' +
            '<div>' +
              '<div class="timeline-task">' + escapeHtml(e.title) + '</div>' +
              (e.meta ? '<div class="timeline-meta">' + escapeHtml(e.meta) + '</div>' : '') +
            '</div>' +
            '<div class="timeline-date">' + formatDate(e.date) + '</div>' +
          '</div>' +
          (e.cost != null ? '<div class="timeline-cost">$' + Number(e.cost).toFixed(2) + ' spent</div>' : '') +
          (e.note ? '<div class="timeline-note">"' + escapeHtml(e.note) + '"</div>' : '') +
          '<span class="timeline-tag ' + e.tag + '">' + e.tagLabel + '</span>' +
        '</div>' +
      '</div>';
    });
    html += '</div></div>';
  });

  document.getElementById('timelineContent').innerHTML = html;
}

buildTimeline();
</script>
</body>
</html>
